<template>
    <div class="slds-modal__container">
        <div class="slds-modal__header">
            <h2 class="slds-text-heading_medium">Generate Payment Schedule</h2>
        </div>
        
        <div class="slds-modal__content slds-p-around_medium">
            <p>This will create installment records based on the selected payment plan.</p>
            <p>Do you want to proceed?</p>
            
            <!-- Spinner when loading -->
            <template if:true={showSpinner}>
                <div class="slds-spinner_container">
                    <div class="slds-spinner slds-spinner_medium" role="status">
                        <span class="slds-assistive-text">Loading</span>
                        <div class="slds-spinner__dot-a"></div>
                        <div class="slds-spinner__dot-b"></div>
                    </div>
                </div>
            </template>
        </div>
        
        <div class="slds-modal__footer">
            <button class="slds-button slds-button_neutral" onclick={handleCancel} 
                    disabled={isLoading}>Cancel</button>
            <button class="slds-button slds-button_brand" onclick={handleGenerateSchedule} 
                    disabled={isLoading}>
                <template if:true={isLoading}>
                    Processing...
                </template>
                <template if:false={isLoading}>
                    Generate Schedule
                </template>
            </button>
        </div>
    </div>
</template>
