<template>
    <!-- Carousel -->
    <section class="carousel">
        <div class="carousel-image">
            <img src={carouselImage} alt="Agency Onboarding" />

        </div>
    </section>

    <lightning-card>
       
            <!-- Agency Type Toggle -->
         <div class="slds-p-around_medium">
            <!-- Agency Onboarding Form Title at Top -->
            <div class="form-title-container slds-m-bottom_medium">
                <h2 class="slds-text-heading_large slds-text-align_center slds-text-color_brand">
                    Channel Partner Onboarding Form
                </h2>
            </div>

            <!-- Step Progress Bar -->
            <div class="step-progress-bar">
                <template for:each={steps} for:item="step">
                    <div key={step.number} class={step.class}>
                        {step.label}
                    </div>
                </template>
            </div>



            <!-- Agency Type Toggle -->
            <h3 class="slds-text-heading_small slds-m-bottom_small">AGENCY TYPE</h3>
            <div class="toggle-container">
                <label class="toggle-option">
                    <input type="checkbox" checked={isCorporate} onchange={handleCorporateSelect} />
                    <span>Corporate</span>
                </label>
                <label class="toggle-option">
                    <input type="checkbox" checked={isIndividual} onchange={handleIndividualSelect} />
                    <span>Individual</span>
                </label>
            </div>
<template if:true={stepErrors.length}>
    <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium">
        <span class="slds-assistive-text">Error</span>
        <h2 class="slds-text-heading_small">
            Please fill required fields: {stepErrorsText}
        </h2>
        <!-- Remove the entire <ul> list code -->
    </div>
</template>

                   <template if:true={isStep4}>
    <div class="section-header">Step 4: Documents</div>

        Required documents to upload:
    </h3>


    <div class="slds-grid slds-wrap slds-gutters">

        <!-- 1) Trade license -->
        <template if:true={showTradeLicense}>
    <div class="slds-col slds-size_1-of-3">
        <div class="doc-box">
            <h3 class="doc-title">Trade License
                  <span class="doc-required-star"></span>
            </h3>
<template if:true={canUploadFiles}>
            <lightning-file-upload
                multiple
                file-field-name="Guest_Record_fileupload__c"
                file-field-value= {fileValue}
                data-doc-type="Trade license"
                accept=".pdf,.jpg,.jpeg,.png"
                disabled={disableUploader}
                onuploadfinished={handleUploadFinished}>
            </lightning-file-upload>
            
            <!--  record-id={createdRecordId}  -->
</template>
            <template if:true={tradeLicenseFileName}>
                <p class="uploaded-file">{tradeLicenseFileName}</p>
            </template>
        </div>
    </div>
</template>

<template if:true={showSuccessModal}>
    <section role="dialog" tabindex="-1" class="success-modal-wrapper">
        <div class="success-modal-card">

            <!-- Close icon (optional) -->
            <button class="close-icon" onclick={closeSuccessModal} title="Close">
                ×
            </button>

            <!-- Green circle with tick -->
            <div class="success-icon">
                ✓
            </div>

            <!-- Text area -->
            <h2 class="success-title">Agency Onboarding Successful</h2>
            <p class="success-subtitle">
                Thank you for completing the Agency Onboarding Registration.
            </p>
            <p class="success-text">
                Your details have been submitted successfully and are currently under review by our team.
                If any additional information or documents are required, we will reach out to you.
            </p>

        </div>
    </section>

    <div class="success-backdrop"></div>
</template>

                <h2 class="slds-text-heading_medium">

                    {duplicateMessage}

                <p class="slds-m-top_small">
                    Broker Registration Number &nbsp;:&nbsp;
                    <strong>{duplicateRecordName}</strong>
                </p>

            <footer class="slds-modal__footer">
                <lightning-button
                    label="Close"
                    variant="neutral"
                    onclick={closeDuplicateModal}>
                </lightning-button>
            </footer>

        </div>
    </section>

    <!-- Backdrop -->
    <div class="slds-backdrop slds-backdrop_open"></div>
